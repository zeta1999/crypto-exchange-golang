network:
  listen_grpc: ":50051"
  listen_http: ":8080"
  listen_ws: ":8081"
  token_secret: "dev-secret-token"
  tls:
    cert_file: "certs/dev-cert.pem"
    key_file: "certs/dev-key.pem"
database:
  dsn: "memory"
limits:
  max_open_orders: 5000
  min_tick_size: 0.01
instruments:
  - symbol: "BTC-USD"
    base: "BTC"
    quote: "USD"
  - symbol: "ETH-USD"
    base: "ETH"
    quote: "USD"
storage:
  wal_path: "data/exchange.wal"
# Binance-spot-compatible REST edge (PLAN Phase 8 — a documented SUBSET). When
# enabled, a stock Binance client (CCXT, python-binance) pointed at `listen`
# with only the base URL changed can place/cancel/query orders and read
# depth/ticker. REST only; the WebSocket user-data / market streams are a noted
# follow-up. Disabled by default.
api:
  binance:
    enabled: false
    listen: ":8082"
    api_key: ""                # credential the client sends in X-MBX-APIKEY
    secret: ""                 # HMAC-SHA256 signing secret
    symbols:                   # Binance concatenated symbol -> engine instrument
      - binance: "BTCUSDT"
        engine: "BTC-USD"
      - binance: "ETHUSDT"
        engine: "ETH-USD"
  # Coinbase-Advanced-Trade-compatible REST edge (PLAN Phase 9 — a documented
  # SUBSET). When enabled, a client (CCXT in HMAC mode) pointed at `listen` with
  # only the base URL changed can place/cancel/query orders and read the product
  # book + a product ticker. REST only; the WebSocket channels are a noted
  # follow-up. Auth uses the legacy Coinbase Exchange HMAC scheme (CB-ACCESS-*);
  # production JWT/ES256 is deferred. Disabled by default.
  coinbase:
    enabled: false
    listen: ":8083"
    api_key: ""                # credential the client sends in CB-ACCESS-KEY
    secret: ""                 # HMAC-SHA256 signing secret (base64 or raw)
    passphrase: ""             # optional; enforced only if set
    products:                  # allow-list of product IDs (== engine instruments)
      - "BTC-USD"
      - "ETH-USD"
# Live-venue emulation: mirror a real exchange's order book into the engine as
# synthetic liquidity, converging back to the reference after user trades.
# Set enabled: false to run as a plain matching engine (offline).
emulator:
  enabled: true
  venue: "coinbase"            # coinbase | binance
  instruments: ["BTC-USD", "ETH-USD"]   # must match engine symbols above
  reference:
    depth_levels: 20           # price levels per side to mirror (0 = full book)
    refresh_ms: 250            # reconcile / convergence cadence
  rtr:
    tau_ms: 3000               # return-to-reference horizon; 0 = instant mirror
  toxicity:                    # adverse selection; scale 0 = off (pure return-to-reference)
    scale: 0.0                 # >0 enables: resting user orders get picked off more in toxic flow
    kyle_weight: 1.0           # lambda → price penetration of the adverse sweep
    vpin_weight: 1.0           # VPIN → adverse-fill probability
    window_trades: 500         # rolling window for the lambda regression
    bucket_volume: 1.0         # VPIN volume-bucket size (base asset)
    buckets: 50                # VPIN buckets averaged
    seed: 42                   # deterministic firing
  price_shift:                 # artificial price shift — manufacture cross-venue arb (test bed)
    offset_bps: 0              # additive shift in basis points (0 = none)
    scale: 1.0                 # multiplicative shift (1.0 = none); shifted = price*scale*(1+offset_bps/10000)
  latency:                     # artificial latency injection (test bed); all 0 = no added delay
    feed_to_book_ms: 0         # delays the reference goroutine (a slow feed)
    order_ack_ms: 0            # API-edge ack delay (Phase 8/9)
    fill_report_ms: 0          # API-edge fill-report delay (Phase 8/9)
    jitter_ms: 0               # uniform random [0, jitter) added on top of each base delay
  scenario:                    # scripted test-bed timeline (Phase 7); empty file = static controls (no runner)
    file: ""                   # path to a JSONL scenario; each line: {"at_ms":N,"action":"price_shift|latency","params":{...}}
    speed: 1.0                 # schedule scaling: 1.0 = real time, >1 accelerates (10 runs a 10s timeline in 1s)
