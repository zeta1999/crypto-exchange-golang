network:
  listen_grpc: ":50051"
  listen_http: ":8080"
  listen_ws: ":8081"
  token_secret: "dev-secret-token"
  tls:
    cert_file: "certs/dev-cert.pem"
    key_file: "certs/dev-key.pem"
database:
  dsn: "memory"
limits:
  max_open_orders: 5000
  min_tick_size: 0.01
instruments:
  - symbol: "BTC-USD"
    base: "BTC"
    quote: "USD"
  - symbol: "ETH-USD"
    base: "ETH"
    quote: "USD"
storage:
  wal_path: "data/exchange.wal"
# Live-venue emulation: mirror a real exchange's order book into the engine as
# synthetic liquidity, converging back to the reference after user trades.
# Set enabled: false to run as a plain matching engine (offline).
emulator:
  enabled: true
  venue: "coinbase"            # coinbase | binance
  instruments: ["BTC-USD", "ETH-USD"]   # must match engine symbols above
  reference:
    depth_levels: 20           # price levels per side to mirror (0 = full book)
    refresh_ms: 250            # reconcile / convergence cadence
  rtr:
    tau_ms: 3000               # return-to-reference horizon; 0 = instant mirror
  toxicity:                    # adverse selection; scale 0 = off (pure return-to-reference)
    scale: 0.0                 # >0 enables: resting user orders get picked off more in toxic flow
    kyle_weight: 1.0           # lambda → price penetration of the adverse sweep
    vpin_weight: 1.0           # VPIN → adverse-fill probability
    window_trades: 500         # rolling window for the lambda regression
    bucket_volume: 1.0         # VPIN volume-bucket size (base asset)
    buckets: 50                # VPIN buckets averaged
    seed: 42                   # deterministic firing
